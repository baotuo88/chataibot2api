services:
  chataibot2api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-chataibot2api}
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${APP_PORT:-8880}:${APP_PORT:-8880}"
    volumes:
      - ./accounts.json:/app/accounts.json
    environment:
      APP_PORT: ${APP_PORT:-8880}
      APP_POOL: ${APP_POOL:-10}
      APP_MAX_BODY_MB: ${APP_MAX_BODY_MB:-20}
      APP_MAX_IMAGES: ${APP_MAX_IMAGES:-4}
      APP_ACQUIRE_TIMEOUT_SEC: ${APP_ACQUIRE_TIMEOUT_SEC:-45}
      APP_ACCOUNTS_FILE: ${APP_ACCOUNTS_FILE:-accounts.json}
      APP_AUTH_KEY: ${APP_AUTH_KEY:-}
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${APP_PORT:-8880}/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
