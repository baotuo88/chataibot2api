<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ChatAIBot 2API</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">ChatAIBot<span>2API</span></h1>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <span data-i18n="nav.dashboard">仪表盘</span>
        </a>

        <a href="accounts.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span data-i18n="nav.accounts">账号管理</span>
        </a>

        <a href="playground.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" y2="15"></line>
            <line x1="15" y1="9" x2="9" y2="15"></line>
          </svg>
          <span data-i18n="nav.playground">API 测试</span>
        </a>

        <a href="history.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span>请求历史</span>
        </a>

        <a href="logs.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span data-i18n="nav.logs">运行日志</span>
        </a>

        <a href="settings.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6m5.2-13.2l-4.2 4.2m0 6l4.2 4.2M23 12h-6m-6 0H1m18.2 5.2l-4.2-4.2m-6 0l-4.2 4.2"></path>
          </svg>
          <span data-i18n="nav.settings">系统设置</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="theme-switch" id="theme-switch">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </div>

        <div class="lang-switch">
          <button class="lang-btn active" data-lang="zh">中文</button>
          <button class="lang-btn" data-lang="en">English</button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <div>
          <h2 data-i18n="dashboard.title">仪表盘</h2>
          <p data-i18n="dashboard.subtitle">系统运行状态概览</p>
        </div>
        <div class="header-actions">
          <span class="status-badge" id="status-badge">
            <span class="status-dot"></span>
            <span data-i18n="status.loading">加载中...</span>
          </span>
        </div>
      </header>

      <div class="content-wrapper">
        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label" data-i18n="dashboard.accounts">账号总数</div>
              <div class="stat-value" id="total-accounts">0</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon green">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label" data-i18n="dashboard.requests">总请求数</div>
              <div class="stat-value" id="total-requests">0</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon purple">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label" data-i18n="dashboard.success_rate">成功率</div>
              <div class="stat-value" id="success-rate">0%</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon orange">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label" data-i18n="dashboard.uptime">运行时间</div>
              <div class="stat-value" id="uptime">0s</div>
            </div>
          </div>
        </div>

        <!-- Charts Row -->
        <div class="charts-row">
          <div class="chart-card">
            <div class="card-header">
              <h3 data-i18n="dashboard.request_types">请求类型分布</h3>
            </div>
            <div class="chart-content">
              <div class="request-type-item">
                <div class="type-label">
                  <span class="type-dot" style="background: #3b82f6;"></span>
                  <span data-i18n="dashboard.text_to_image">文生图</span>
                </div>
                <div class="type-value" id="text-requests">0</div>
              </div>
              <div class="request-type-item">
                <div class="type-label">
                  <span class="type-dot" style="background: #10b981;"></span>
                  <span data-i18n="dashboard.image_edit">图片编辑</span>
                </div>
                <div class="type-value" id="edit-requests">0</div>
              </div>
              <div class="request-type-item">
                <div class="type-label">
                  <span class="type-dot" style="background: #f59e0b;"></span>
                  <span data-i18n="dashboard.image_merge">图片合并</span>
                </div>
                <div class="type-value" id="merge-requests">0</div>
              </div>
            </div>
          </div>

          <div class="chart-card">
            <div class="card-header">
              <h3 data-i18n="dashboard.pool_status">账号池状态</h3>
            </div>
            <div class="chart-content">
              <div class="pool-info">
                <div class="pool-item">
                  <span data-i18n="dashboard.pool_max">池容量</span>
                  <strong id="pool-max">--</strong>
                </div>
                <div class="pool-item">
                  <span data-i18n="dashboard.pool_ready">可用账号</span>
                  <strong id="pool-ready">--</strong>
                </div>
              </div>
              <div class="quota-display">
                <div class="quota-label" data-i18n="dashboard.quotas">账号额度</div>
                <div class="quota-chips" id="quota-chips">
                  <span class="quota-chip">--</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- System Info -->
        <div class="info-card">
          <div class="card-header">
            <h3 data-i18n="dashboard.system_info">系统信息</h3>
          </div>
          <div class="info-grid">
            <div class="info-item">
              <span class="info-label" data-i18n="dashboard.port">端口</span>
              <span class="info-value" id="cfg-port">--</span>
            </div>
            <div class="info-item">
              <span class="info-label" data-i18n="dashboard.auth">鉴权</span>
              <span class="info-value" id="cfg-auth">--</span>
            </div>
            <div class="info-item">
              <span class="info-label" data-i18n="dashboard.last_model">最近模型</span>
              <span class="info-value" id="last-model">--</span>
            </div>
            <div class="info-item">
              <span class="info-label" data-i18n="dashboard.last_mode">最近模式</span>
              <span class="info-value" id="last-mode">--</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
